<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hubify Store - Cek inbox email temporary Anda.">
  <title>Hubify Store - Email Inbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/brutalism.css">
  <link rel="stylesheet" href="./css/inbox-viewer.css">
</head>

<body>
  <header class="header">
    <div class="header__inner">
      <a href="/" class="header__logo">
        <span>HUBIFY</span>.STORE
      </a>
    </div>
  </header>

  <main class="main inbox-viewer-main">
    <section class="brutal-box brutal-box--yellow inbox-card">
      <div class="inbox-card__header">
        <div class="icon-box icon-box--pink">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
        </div>
        <h1 class="inbox-card__title">CEK INBOX</h1>
      </div>
      <label class="inbox-card__label" for="email-input">Masukkan Email</label>
      <div class="inbox-card__input-wrap">
        <input
          type="text"
          id="email-input"
          class="input inbox-card__input"
          placeholder="email@example.com"
          autocomplete="off"
          style="margin-bottom:0;"
        >
        <div class="history-dropdown hidden" id="history-dropdown"></div>
      </div>
      <div class="inbox-card__actions">
        <button type="button" class="btn btn--green" id="btn-search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          Cek Inbox
        </button>
        <button type="button" class="btn hidden" id="btn-refresh">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23,4 23,10 17,10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
          Refresh
        </button>
      </div>
      <div class="inbox-card__info brutal-box" role="status">
        <div class="icon-box icon-box--cyan">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="16" x2="12" y2="12" />
            <line x1="12" y1="8" x2="12.01" y2="8" />
          </svg>
        </div>
        <p>Masukkan email lalu klik Cek Inbox untuk melihat semua pesan masuk.</p>
      </div>

      <!-- Countdown Progress Bar (hidden until polling starts) -->
      <div class="refresh-bar-wrap hidden" id="refresh-bar-wrap">
        <div class="refresh-bar-label">
          <span>Auto-refresh</span>
          <span id="refresh-countdown">5s</span>
        </div>
        <div class="refresh-bar-track">
          <div class="refresh-bar-fill" id="refresh-bar-fill"></div>
        </div>
      </div>
    </section>

    <section class="brutal-box inbox-result hidden" id="inbox-result">
      <div class="inbox-result__header">
        <div class="icon-box icon-box--orange">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 12h-6l-2 3h-4l-2-3H2" />
            <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" />
          </svg>
        </div>
        <div>
          <h2 class="inbox-result__title">INBOX</h2>
          <p class="inbox-result__email" id="result-email"></p>
        </div>
      </div>
      <div class="inbox-search-wrap">
        <input type="text" id="inbox-search" class="input inbox-search__input" placeholder="🔍 Cari pengirim, subjek, atau isi email...">
      </div>
      <div class="inbox-result__loading hidden" id="result-loading">Memuat...</div>
      <ul class="inbox-result__list" id="result-list"></ul>
      <div class="inbox-result__empty hidden" id="result-empty">
        <p>Belum ada email masuk.</p>
        <p class="inbox-result__empty-hint">Tunggu beberapa saat lalu cek lagi. Inbox otomatis refresh setiap 5 detik.</p>
      </div>
    </section>
  </main>

  <!-- Email Modal -->
  <div class="modal" id="email-modal">
    <div class="modal__content">
      <div class="modal__header">
        <h3 class="modal__title" id="modal-subject">Subject</h3>
        <button class="modal__close" id="modal-close">✕</button>
      </div>
      <div class="modal__meta">
        <p><strong>From:</strong> <span id="modal-from"></span></p>
        <p><strong>To:</strong> <span id="modal-to"></span></p>
        <p><strong>Date:</strong> <span id="modal-date"></span></p>
      </div>
      <div class="modal__body">
        <div class="modal__body-text" id="modal-body"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/inbox-viewer.js"></script>
</body>

</html>
